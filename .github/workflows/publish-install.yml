name: Publish install site

on:
  push:
    branches: [main]
    # Only rebuild the install site when something that ends up in site/ has
    # actually changed. Docs / test / collector-config changes don't affect
    # the deployed artifacts, so there's no reason to redeploy for them.
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'scripts/uninstall.sh'
      - 'site/**'
      - '.github/workflows/publish-install.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if [ "${GITHUB_EVENT_NAME}" = "release" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName 2>/dev/null || true)"
          fi
          if [ -z "${TAG:-}" ]; then
            TAG="__NOT_RELEASED__"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "resolved release tag: ${TAG}"

      - name: Assemble site directory
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          # Anchor the substitution to the literal assignment line so we don't
          # also rewrite the placeholder occurrences inside the safety check
          # ("|__TRACEWAY_VERSION__|" inside the case / -eq compare). A naive
          # global sed turns the trap arm into the real version and bricks
          # every install.
          sed 's|DEFAULT_VERSION="__TRACEWAY_VERSION__"|DEFAULT_VERSION="'"${TAG}"'"|' \
              scripts/install.sh > site/install.sh
          sed "s|else { '__TRACEWAY_VERSION__' })|else { '${TAG}' })|" \
              scripts/install.ps1 > site/install.ps1
          cp scripts/uninstall.sh site/uninstall.sh
          chmod 0644 site/install.sh site/install.ps1 site/uninstall.sh

          # Fail loudly if either substitution didn't take effect — that would
          # mean the assignment-line text drifted from what we're matching here.
          grep -q "^DEFAULT_VERSION=\"${TAG}\"$" site/install.sh \
            || { echo "install.sh substitution did not match"; exit 1; }
          grep -q "else { '${TAG}' })" site/install.ps1 \
            || { echo "install.ps1 substitution did not match"; exit 1; }

          echo "--- site/ ---"
          ls -la site/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=traceway-otel-agent-install --branch=main
