name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.116.0

      - name: Build collector
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          builder --config=builder-config.yaml

      - name: Validate default config
        env:
          TRACEWAY_TOKEN: ci-placeholder-token
          TRACEWAY_ENDPOINT: https://cloud.tracewayapp.com/api/otel
          TRACEWAY_SERVICE_NAME: ci
        run: ./dist/traceway-otel-agent validate --config=config/default.yaml

      - name: Upload collector binary
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-amd64
          path: dist/traceway-otel-agent
          retention-days: 1
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/install.sh scripts/uninstall.sh scripts/release.sh tests/install/run.sh

      - name: yamllint
        run: |
          python -m pip install --user yamllint
          ~/.local/bin/yamllint \
            -d "{extends: default, rules: {line-length: disable, document-start: disable, comments: {min-spaces-from-content: 1}, truthy: {check-keys: false}}}" \
            config/ builder-config.yaml .github/workflows/ tests/e2e/testdata/

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -AcceptLicense
          $results = Invoke-ScriptAnalyzer -Path scripts/install.ps1 -Severity Error
          if ($results) { $results | Format-Table -AutoSize; throw "PSScriptAnalyzer found errors" }

  test-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download collector binary
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-amd64
          path: dist

      - name: Make binary executable
        run: chmod +x dist/traceway-otel-agent

      - name: Run agent E2E test
        run: cd tests/e2e && go test -v -timeout 120s ./...

  test-install:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download collector binary
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-amd64
          path: dist

      - name: Make binary executable
        run: chmod +x dist/traceway-otel-agent

      - name: Run install smoke test
        run: bash tests/install/run.sh
